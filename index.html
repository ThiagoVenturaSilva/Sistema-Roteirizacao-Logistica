<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortyrota</title>
    <link rel="stylesheet" href="/CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <img src="/assets/logo.png" alt="Logo Fortymil" class="logo" />
        <div class="system-info">
          <h1 class="system-name">Fortyrota</h1>
          <p class="system-subtitle">Sistema Inteligente de Roteirização</p>
        </div>
      </div>

      <div class="user-container">
        <div class="user-item">
          <i class="bi bi-person"></i>
          <span class="user">Thiago Ventura</span>
        </div>

        <div class="user-item">
          <i class="bi bi-calendar3"></i>
          <span id="date"></span>
        </div>

        <div class="user-item">
          <i class="bi bi-clock"></i>
          <span id="clock"></span>
        </div>
      </div>
    </header>

    <div class="layout">

         <div class= "container-sidebar">
<aside class="aside-sidebar">

<nav class="navegacao-sidebar"> 

            <i class="bi bi-house">
              <button id = "button-home" class="button-side"> Home </button> 
            </i> 

            <i class="bi bi-card-heading">
              <button id="button-relatorio" class="button-side"> Relatório </button> 
            </i> 

            <i class="bi bi-distribute-horizontal">
             <button id = "button-dashboard" class="button-side"> Dashboard </button> 
            </i> 

            <i class="bi bi-file-earmark-arrow-down">
              <button class="button-side"> Exportar </button> 
            </i> 
         
            <i class="bi bi-file-earmark-arrow-up">
              <button class="button-side"> Importar </button> 
            </i> 
      
            <i class="bi bi-gear">
             <button id="button-config" class="button-side"> Configurações </button>   
            </i> 

    </div>

    <main id="main_container"></main>

    </div>

</nav>

</aside>    

  </nav>

</div>

    <script src="/JS/app.js"></script>
    <script src="/JS/home.js"></script>
    <script src="/JS/dashboard.js"></script>
    <script src="/JS/relatorio.js"></script>
  <script src="/JS/configuracoes.js"></script>
  </body>
</html>
