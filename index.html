<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fortyrota</title>
    <link rel="stylesheet" href="/CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <img src="/assets/logo.png" alt="Logo Fortymil" class="logo" />
        <div class="system-info">
          <h1 class="system-name">Fortyrota</h1>
          <p class="system-subtitle">Sistema Inteligente de Roteirização</p>
        </div>
      </div>

      <div class="user-container">
        <div class="user-item">
          <i class="bi bi-person"></i>
          <span class="user">Thiago Ventura</span>
        </div>

        <div class="user-item">
          <i class="bi bi-calendar3"></i>
          <span id="date"></span>
        </div>

        <div class="user-item">
          <i class="bi bi-clock"></i>
          <span id="clock"></span>
        </div>
      </div>
    </header>

    <div class="layout">

         <div class= "container-sidebar">
<aside class="aside-sidebar">

<nav class="navegacao-sidebar"> 

    <ul class="lista-home"> 
            <i class="bi bi-house">
              Home
            </i> </ul>

            <ul class="lista-Relatorio"> 
            <i class="bi bi-card-heading">
              Relatório
            </i> </ul>

            <ul class="lista-dashboard"> 
            <i class="bi bi-distribute-horizontal">
              Dashboard
            </i> </ul>

            <ul class="lista-exportar"> 
            <i class="bi bi-file-earmark-arrow-down">
              Exportar
            </i> </ul>

            <ul class="lista-importar"> 
            <i class="bi bi-file-earmark-arrow-up">
              Importar
            </i> </ul>

            <ul class="lista-configuracoes"> 
            <i class="bi bi-gear">

              Configurações
            </i> </ul>


    </div>

         <div class="main-container">

    <main class="main-content">

    <h1 id="bem-vindo"> Bem vindo, Thiago! </h1>
    <p class="atualizacoes">Principais atualizações:</p>
      
  </main>

  <div class="layout-container">
    
   <div class="cards-container">

      <h1> Pedidos </h1>
      
  </div>
  
  <div class="cards-container">

      <h1> Kilos </h1>
      
  </div>
  
  <div class="cards-container">

      <h1> Regiões </h1>
      
  </div>

  
  </div>

<div class="progress">
  <div class="progress-bar" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
</div>

</div>
   
    </div>


</nav>

        

</aside>    

  </nav>

 

</div>

    <script src="/JS/app.js"></script>
  </body>
</html>
